<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Ink · Admin</title>
  <style>
    :root {
      --paper: #e7dfce; --paper-2: #efe9db; --card: #f3eee2; --ink: #1b1813;
      --soft: #4a4438; --muted: #8b8473; --line: #d8cfba;
      --ok: #3f6b4c; --warn: #b07d2b; --danger: #9b3b2f; --accent: #1b1813;
      --radius: 14px; --radius-sm: 9px;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    /* The `hidden` attribute must win over author display rules (e.g. .login{display:flex}),
       otherwise hiding the login overlay after unlock does nothing. */
    [hidden] { display: none !important; }
    body { margin: 0; background: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased; }
    h1, h2, h3 { font-family: Georgia, "Times New Roman", serif; font-weight: 700; }
    a { color: var(--ink); }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 18px 20px 80px; }

    /* Login */
    .login { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login .box { width: min(360px, 100%); background: var(--card); border: 1.5px solid var(--line);
      border-radius: var(--radius); padding: 26px 24px; box-shadow: 0 20px 50px rgba(0,0,0,.12); }
    .login h1 { margin: 0 0 4px; font-size: 26px; }
    .login p { color: var(--muted); margin: 0 0 18px; font-size: 14px; }
    input[type=password], input[type=text], input[type=search] {
      width: 100%; padding: 12px 13px; font: inherit; color: var(--ink);
      background: var(--paper-2); border: 1.5px solid var(--line); border-radius: var(--radius-sm); }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 11px 16px; border-radius: var(--radius-sm); border: 1.5px solid var(--ink);
      background: var(--ink); color: var(--paper); font: inherit; font-weight: 600; cursor: pointer; }
    .btn.ghost { background: transparent; color: var(--ink); }
    .btn.sm { padding: 7px 12px; font-size: 13px; }
    .err { color: var(--danger); font-size: 13px; margin: 10px 0 0; min-height: 16px; }

    /* Header + tabs */
    .top { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
    .top h1 { font-size: 22px; margin: 0; }
    .top .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ink); }
    .top .meta { color: var(--muted); font-size: 12.5px; margin-left: auto; }
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    .tabs button { padding: 8px 15px; border-radius: 999px; border: 1.5px solid var(--line);
      background: var(--paper-2); color: var(--soft); font: inherit; font-weight: 600; font-size: 13.5px; cursor: pointer; }
    .tabs button.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    /* KPI cards */
    .kpis { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 22px; }
    .kpi { background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius); padding: 14px 16px; }
    .kpi .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .kpi .value { font-family: Georgia, serif; font-size: 27px; font-weight: 700; margin-top: 4px; }
    .kpi .value small { font-size: 14px; color: var(--muted); font-weight: 400; }
    .kpi .sub { font-size: 12px; color: var(--soft); margin-top: 3px; }

    .card { background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius);
      padding: 16px 18px; margin-bottom: 18px; }
    .card h3 { margin: 0 0 12px; font-size: 15px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    @media (max-width: 720px) { .grid2 { grid-template-columns: 1fr; } }

    /* Tables */
    .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
    th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: .05em; }
    td.wrap-cell { white-space: normal; max-width: 380px; color: var(--soft); }
    tr:hover td { background: rgba(27,24,19,.03); }
    .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }

    /* Pills */
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11.5px; font-weight: 600; }
    .pill.online { background: rgba(63,107,76,.16); color: var(--ok); }
    .pill.sleep { background: rgba(139,132,115,.18); color: var(--soft); }
    .pill.offline { background: rgba(155,59,47,.14); color: var(--danger); }
    .pill.ok { background: rgba(63,107,76,.16); color: var(--ok); }
    .pill.fail { background: rgba(155,59,47,.16); color: var(--danger); }
    .pill.auto { background: rgba(27,24,19,.08); color: var(--soft); }
    .pill.manual { background: rgba(176,125,43,.16); color: var(--warn); }

    /* Charts */
    .chart { width: 100%; height: 150px; display: block; }
    .chart .bar { fill: var(--ink); }
    .chart .bar.err { fill: var(--danger); }
    .chart .axis { stroke: var(--line); stroke-width: 1; }
    .chart-legend { font-size: 12px; color: var(--muted); margin-top: 6px; display: flex; gap: 16px; }
    .chart-legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 5px; vertical-align: -1px; }

    /* Gallery */
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; align-items: start; }
    .shot { background: var(--card); border: 1.5px solid var(--line); border-radius: var(--radius-sm); overflow: hidden; }
    /* Match the tile aspect to the artwork's orientation so it fills edge-to-edge
       (no letterbox, no crop) — the date/signature at the margins stay visible. */
    .shot img { width: 100%; display: block; background: #fff; object-fit: contain; aspect-ratio: 800 / 480; }
    .shot.portrait img { aspect-ratio: 480 / 800; }
    .shot.landscape img { aspect-ratio: 800 / 480; }
    .shot .cap { padding: 8px 10px; }
    .shot .cap .d { font-size: 11px; color: var(--muted); }
    .shot .cap .c { font-size: 12px; color: var(--soft); margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .empty { color: var(--muted); font-size: 14px; padding: 20px 0; text-align: center; }
    .loading { color: var(--muted); padding: 30px 0; text-align: center; }

    /* Row action buttons (accounts) */
    .rowbtn { padding: 5px 11px; border-radius: 8px; border: 1.5px solid var(--line);
      background: var(--paper-2); color: var(--soft); font: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; }
    .rowbtn:hover { border-color: var(--ink); color: var(--ink); }
    .rowbtn.danger { border-color: rgba(155,59,47,.4); color: var(--danger); }
    .rowbtn.danger:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
    .rowbtn + .rowbtn { margin-left: 6px; }
    .rowbtn:disabled { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <!-- Login gate -->
  <div id="login" class="login">
    <form class="box" id="login-form">
      <h1>Ink Admin</h1>
      <p>Enter the admin token to view the monitoring console.</p>
      <input id="token" type="password" placeholder="ADMIN_TOKEN" autocomplete="current-password" />
      <p id="login-err" class="err"></p>
      <button class="btn" type="submit" style="width:100%">Unlock</button>
    </form>
  </div>

  <!-- Console -->
  <div id="console" class="wrap" hidden>
    <div class="top">
      <span class="dot"></span>
      <h1>Ink Admin</h1>
      <span class="meta" id="refreshed"></span>
      <button class="btn ghost sm" id="refresh-btn" type="button">Refresh</button>
      <button class="btn ghost sm" id="logout-btn" type="button">Log out</button>
    </div>
    <nav class="tabs" id="tabs">
      <button data-tab="overview" class="active">Overview</button>
      <button data-tab="frames">Frames</button>
      <button data-tab="generations">Generations</button>
      <button data-tab="gallery">Gallery</button>
      <button data-tab="accounts">Accounts</button>
      <button data-tab="api">API calls</button>
    </nav>
    <section id="tab-overview" class="tab"></section>
    <section id="tab-frames" class="tab" hidden></section>
    <section id="tab-generations" class="tab" hidden></section>
    <section id="tab-gallery" class="tab" hidden></section>
    <section id="tab-accounts" class="tab" hidden></section>
    <section id="tab-api" class="tab" hidden></section>
  </div>

  <script src="admin.js"></script>
</body>
</html>
