app = "ink-art-frame"
primary_region = "fra"

# Insurance for the once-a-day image decode/dither spike: lets a brief memory
# peak spill to disk instead of OOM-killing the process. Keeps us on the cheap
# 512MB tier safely.
swap_size_mb = 256

[build]

[env]
  DATA_DIR = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "get"
  path = "/healthz"

[mounts]
  source = "ink_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
