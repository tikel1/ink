# ---------------------------------------------------------------------------
# Ink — product firmware (ESPHome, multi-tenant backend).
#
# Every frame runs the SAME firmware and points at the SAME backend; the device
# identifies itself by its WiFi MAC, so there is nothing per-device to flash.
#
# Behavior:
#   • No WiFi saved  -> shows "Join WiFi: Ink Frame" + hosts an onboarding hotspot.
#   • WiFi, unpaired -> shows a QR + 6-digit code; scan/enter it in the Ink app.
#   • Paired:
#       - On USB power -> stays ON, refreshes the art periodically.
#       - On battery   -> sleeps; press KEY1 to wake + refresh, then sleeps again
#                         after `idle_minutes` of no interaction.
#   Buttons: KEY1 = wake/refresh, KEY2 = stay awake, KEY3 = tap: sleep · hold 5s:
#   factory reset (clears WiFi + pairing).
#
# Set `backend_base` before flashing. `timezone` is for the clock; the daily
# generation hour is set per frame in the app.
# ---------------------------------------------------------------------------
substitutions:
  device_name: ink-frame
  friendly_name: "Ink Frame"
  backend_base: "https://your-ink-server.example.com"  # set to your server before flashing
  app_url: "https://tikel1.github.io/ink/"   # QR on the setup screen points here
  timezone: "Asia/Jerusalem"
  idle_minutes: "10"               # battery: sleep after this much idle time
  powered_voltage: "4.15"          # >= this reads as "on USB power" (calibrate)
  powered_refresh_minutes: "30"    # backup re-fetch cadence while powered

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600
    then:
      - script.execute: boot_sequence

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

# The 800x480 1-bit panel buffer is 48 KB — too big for fragmented internal
# DRAM (largest free block ~31 KB). This board has 8 MB octal PSRAM; enabling it
# lets online_image allocate the framebuffer there so the artwork actually
# decodes and renders. (Without this, every image fetch fails with
# "allocation of 48000 bytes failed".)
psram:
  mode: octal
  speed: 80MHz

wifi:
  power_save_mode: light
  ap:
    ssid: ${friendly_name}   # onboarding hotspot when no WiFi is saved
  on_connect:
    - logger.log: "WiFi connected"

captive_portal:

# Native API enables reliable log streaming over WiFi (no flaky USB serial).
api:

ota:
  - platform: esphome

logger:
  level: DEBUG          # diagnosing the display busy-pin timeout
  baud_rate: 115200

http_request:
  useragent: esphome/ink
  timeout: 30s
  verify_ssl: false

time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    on_time:
      # Refresh once a day shortly after 06:00, when the new art is ready.
      - seconds: 0
        minutes: 5
        hours: 6
        then:
          - component.update: online_artwork

globals:
  - id: image_loaded
    type: bool
    initial_value: "false"

# Deep sleep intentionally removed: KEY1-on-GPIO2 sharing the wake pin in polling
# mode triggered spurious sleeps that bricked the board seconds after boot. This
# is an always-awake (USB) build. A debounced, battery-aware sleep can return
# later as its own change.

button:
  - platform: factory_reset
    id: factory_reset_button
    name: "Factory Reset"
    internal: true

binary_sensor:
  # KEY1 = refresh (re-fetch + redraw the current artwork).
  - platform: gpio
    name: "KEY1 refresh"
    internal: true
    pin: { number: GPIO2, mode: INPUT_PULLUP, inverted: true }
    on_press:
      - logger.log: "KEY1 refresh"
      - component.update: online_artwork

  # KEY2 = refresh (re-fetch + redraw the current artwork).
  - platform: gpio
    name: "KEY2 refresh"
    internal: true
    pin: { number: GPIO3, mode: INPUT_PULLUP, inverted: true }
    on_press:
      - logger.log: "KEY2 refresh"
      - component.update: online_artwork

  # KEY3 = hold 5s for factory reset (clears WiFi + pairing).
  - platform: gpio
    name: "KEY3 factory reset"
    internal: true
    pin: { number: GPIO5, mode: INPUT_PULLUP, inverted: true }
    on_multi_click:
      - timing:
          - ON for at least 5s
        then:
          - logger.log: "Factory reset (held 5s)"
          - button.press: factory_reset_button

sensor:
  - platform: adc
    pin: GPIO1
    id: batt
    name: "Battery Voltage"
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 1.1

# Fraunces — the same display serif as the Ink app, for a consistent look.
font:
  - file: { type: gfonts, family: Fraunces, weight: 800 }
    id: ink_display
    size: 78
  - file: { type: gfonts, family: Fraunces, weight: 600 }
    id: ink_head
    size: 33
  - file: { type: gfonts, family: Fraunces, weight: 400 }
    id: ink_body
    size: 25
  - file: { type: gfonts, family: Fraunces, weight: 400, italic: true }
    id: ink_italic
    size: 23

qr_code:
  - id: wifi_qr
    value: "WIFI:S:${friendly_name};T:nopass;;"
  - id: app_qr
    value: "${app_url}"

# Re-fetch the art periodically (always-awake build).
interval:
  - interval: ${powered_refresh_minutes}min
    then:
      - component.update: online_artwork

online_image:
  url: "${backend_base}/media/current/placeholder.png"
  id: online_artwork
  format: png
  resize: 800x480
  type: BINARY
  update_interval: never
  on_download_finished:
    then:
      - lambda: |-
          int w = id(online_artwork).get_width();
          int h = id(online_artwork).get_height();
          ESP_LOGI("ink", "download finished: decoded %dx%d", w, h);
          if (w > 0) { id(image_loaded) = true; }
      - component.update: my_display

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: waveshare_epaper
    id: my_display
    cs_pin: GPIO44
    dc_pin: GPIO10
    reset_pin: GPIO38
    busy_pin: { number: GPIO4, inverted: true }
    model: 7.50inv2
    update_interval: never
    lambda: |-
      if (id(image_loaded) && id(online_artwork).get_width() > 0) {
        it.image(0, 0, id(online_artwork), Color::BLACK, Color::WHITE);
        return;
      }
      // Branded setup screen — Ink masthead, editorial look.
      it.fill(Color::WHITE);
      // Ink mark: an organic ink blob + a separate dot.
      it.filled_circle(92, 92, 33, Color::BLACK);
      it.filled_circle(124, 110, 21, Color::BLACK);
      it.filled_circle(152, 64, 11, Color::BLACK);
      it.print(186, 40, id(ink_display), Color::BLACK, TextAlign::TOP_LEFT, "Ink");
      // Masthead double rule.
      it.filled_rectangle(60, 150, 384, 3, Color::BLACK);
      it.filled_rectangle(60, 157, 384, 1, Color::BLACK);
      it.print(62, 166, id(ink_italic), Color::BLACK, TextAlign::TOP_LEFT,
               "A new work on your wall, every morning.");
      // Getting Started
      it.print(60, 216, id(ink_head), Color::BLACK, TextAlign::TOP_LEFT, "Getting Started");
      it.print(64, 266, id(ink_body), Color::BLACK, TextAlign::TOP_LEFT,
               "1.  Download & install the Ink app");
      it.print(64, 304, id(ink_body), Color::BLACK, TextAlign::TOP_LEFT,
               "2.  Connect to the \"Ink Frame\" Wi-Fi");
      it.print(64, 342, id(ink_body), Color::BLACK, TextAlign::TOP_LEFT,
               "3.  Follow the instructions in the app");
      // App QR (right)
      it.qr_code(598, 152, id(app_qr), Color::BLACK, 5);
      it.print(606, 324, id(ink_body), Color::BLACK, TextAlign::TOP_LEFT, "Scan to");
      it.print(606, 352, id(ink_body), Color::BLACK, TextAlign::TOP_LEFT, "get the app");

script:
  - id: boot_sequence
    then:
      - component.update: my_display  # draw the pairing screen before WiFi exists
      - wait_until: wifi.connected    # stays awake through captive-portal onboarding
      - delay: 3s
      - wait_until:
          condition:
            lambda: "return id(sntp_time).now().is_valid();"
          timeout: 30s
      - lambda: |-
          std::string url = "${backend_base}/media/current/" +
                            get_mac_address() + ".png";
          id(online_artwork).set_url(url.c_str());
      - component.update: online_artwork
