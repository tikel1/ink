# ---------------------------------------------------------------------------
# Ink — product firmware (ESPHome, multi-tenant backend).
#
# Every frame runs the SAME firmware and points at the SAME backend; the device
# identifies itself by its WiFi MAC, so there is nothing per-device to flash.
#
# Behavior:
#   • No WiFi saved  -> shows "Join WiFi: Ink Frame" + hosts an onboarding hotspot.
#   • WiFi, unpaired -> shows a QR + 6-digit code; scan/enter it in the Ink app.
#   • Paired:
#       - On USB power -> stays ON, refreshes the art periodically.
#       - On battery   -> sleeps; press KEY1 to wake + refresh, then sleeps again
#                         after `idle_minutes` of no interaction.
#   Buttons: KEY1 = tap to sleep / wake, KEY2 = refresh, KEY3 = wake.
#   Factory reset (full wipe + re-onboard): hold KEY1 + KEY3 together for 15s.
#   Firmware updates are pulled over the air on an 'ota' command from the app.
#
# Set `backend_base` before flashing. `timezone` is for the clock; the daily
# generation hour is set per frame in the app.
# ---------------------------------------------------------------------------
substitutions:
  device_name: ink-frame
  friendly_name: "Ink Frame"
  backend_base: "https://your-ink-server.example.com"  # fallback if discovery fails
  # Permanent pointer to the *current* server URL. The frame reads this at boot
  # and every few minutes, so when the backend moves (e.g. to Fly.io) you just
  # edit this one file — no reflash. Falls back to backend_base if unreachable.
  config_url: "https://tikel1.github.io/ink/server.txt"
  app_url: "https://tikel1.github.io/ink/"   # QR on the setup screen points here
  fw_label: "1.1.0"                           # firmware version reported to the app (match the published manifest)
  timezone: "Asia/Jerusalem"
  idle_minutes: "10"               # battery: sleep after this much idle time
  powered_voltage: "4.15"          # >= this reads as "on USB power" (calibrate)
  powered_refresh_minutes: "30"    # backup re-fetch cadence while powered

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - ink_sleep.h          # multi-button (KEY1 + KEY3) deep-sleep wake helper
  on_boot:
    - priority: 800
      then:
        - lambda: 'ink_relax_watchdog();'   # 5s -> 30s WDT so a dead server can't reboot-loop
    - priority: 600
      then:
        - script.execute: boot_sequence

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

# The 800x480 1-bit panel buffer is 48 KB — too big for fragmented internal
# DRAM (largest free block ~31 KB). This board has 8 MB octal PSRAM; enabling it
# lets online_image allocate the framebuffer there so the artwork actually
# decodes and renders. (Without this, every image fetch fails with
# "allocation of 48000 bytes failed".)
psram:
  mode: octal
  speed: 80MHz

# Override ESPHome's stock captive portal with an Ink-branded page (the Wi-Fi
# setup screen shown when you join the "Ink Frame" hotspot). The local component
# is a copy of the built-in one with a re-skinned captive_index.h; it still uses
# the same /config.json + /wifisave endpoints, so behaviour is unchanged.
external_components:
  - source:
      type: local
      path: components
    components: [captive_portal]

wifi:
  power_save_mode: light
  ap:
    ssid: ${friendly_name}   # onboarding hotspot when no WiFi is saved
  on_connect:
    - logger.log: "WiFi connected"

captive_portal:

# Native API enables reliable log streaming over WiFi (no flaky USB serial).
# reboot_timeout 0s: there is no persistent API client (we use http_request, not
# Home Assistant), so disable the default 15-min "reboot if no client connected"
# behaviour — otherwise the frame reboots every 15 min and flashes the pairing
# screen on each reboot.
api:
  reboot_timeout: 0s

ota:
  # esphome: local/network OTA for development flashing.
  - platform: esphome
  # http_request: production OTA. On an 'ota' app command the frame pulls the
  # binary from the backend and flashes itself (a browser can't push to it, and a
  # cloud backend can't reach the frame's LAN). MD5 is verified against md5_url.
  - platform: http_request
    on_error:
      then:
        - lambda: 'ESP_LOGW("ink", "OTA failed (code %d) — keeping current firmware", x);'
        # Report the failure so the app can show it (success needs no ping — the
        # frame reboots into the new image and reports the new version).
        - http_request.get:
            url: !lambda |-
              char u[170];
              snprintf(u, sizeof(u), "%s/media/ota-result/%s?code=%d",
                       id(g_backend).c_str(), get_mac_address().c_str(), (int) x);
              return std::string(u);

logger:
  level: INFO
  baud_rate: 115200

http_request:
  useragent: esphome/ink
  timeout: 10s          # fail fast when the server is unreachable (was 30s)
  verify_ssl: false

time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}
    on_time:
      # Refresh once a day shortly after 06:00, when the new art is ready.
      - seconds: 0
        minutes: 5
        hours: 6
        then:
          - component.update: online_artwork

globals:
  - id: image_loaded
    type: bool
    initial_value: "false"
  - id: last_ver
    type: std::string
    initial_value: '""'
  # Current backend URL, resolved from config_url (server.txt). Starts at the
  # compiled fallback so the frame still works before the first resolve.
  - id: g_backend
    type: std::string
    initial_value: '"${backend_base}"'
  # Power config, polled from the backend's .ver headers. Default "usb" so the
  # frame never sleeps unexpectedly until the backend says it's on battery.
  - id: g_power
    type: std::string
    initial_value: '"usb"'
  - id: g_sleep_min
    type: int
    initial_value: "10"
  # Daily wake time as SECONDS since local midnight (minute precision). The
  # backend sends seconds; a legacy bare hour (<=23) is upscaled to seconds.
  - id: g_wake_secs
    type: int
    initial_value: "21600"   # 06:00
  # Image orientation, polled from the backend. Frames ship portrait, so the moon
  # defaults to the portrait corner until the backend says otherwise.
  - id: g_portrait
    type: bool
    initial_value: "true"
  # True once boot + WiFi are up. Manual sleep (KEY1) is blocked until then so a
  # stray press during boot can't sleep the frame before OTA/WiFi is reachable.
  - id: g_booted
    type: bool
    initial_value: "false"
  # True while the frame is asleep — draws the moon indicator into the last frame
  # before deep sleep. Resets to false on wake (deep sleep = full reboot).
  - id: g_asleep
    type: bool
    initial_value: "false"
  # Set by the .ver poll when the app queues an 'ota' / 'reset' command; acted on
  # by sibling actions AFTER the poll's HTTP call returns (never re-entrantly
  # inside the response callback). One-shot — cleared as soon as they fire.
  - id: g_do_ota
    type: bool
    initial_value: "false"
  - id: g_do_reset
    type: bool
    initial_value: "false"
  # MD5 of the latest published firmware, delivered in the .ver poll header
  # (X-OTA-Md5). Passed straight to the OTA flash action so we don't fetch a
  # separate md5 URL during OTA (that fetch proved unreliable on this client).
  - id: g_ota_md5
    type: std::string
    initial_value: '""'
  # Persisted across reboots/sleep (flash). Once the frame has shown art it is a
  # set-up frame, so reboots/wakes keep the retained artwork instead of flashing
  # the QR pairing screen. Cleared by factory reset.
  - id: g_paired_once
    type: bool
    initial_value: "false"
    restore_value: true

# Deep sleep wakes on a daily timer (guaranteed fallback) AND on a press of
# KEY1 (GPIO2) or KEY3 (GPIO5) — the ext1 multi-button wake is configured in the
# go_to_sleep script via ink_sleep.h, so no wakeup_pin is set here.
deep_sleep:
  id: deep_sleep_component

button:
  - platform: factory_reset
    id: factory_reset_button
    name: "Factory Reset"
    internal: true

binary_sensor:
  # KEY1 = sleep / wake. While asleep a press wakes the frame (ext1 wake pin);
  # while awake a short TAP puts it to sleep. We use on_click (50ms–1.5s) rather
  # than on_press so that holding KEY1 — as part of the KEY1+KEY3 reset combo —
  # does NOT sleep the frame. Blocked until g_booted so a tap during boot can't
  # sleep before OTA/WiFi is up.
  - platform: gpio
    name: "KEY1 sleep/wake"
    id: key1_btn
    internal: true
    pin: { number: GPIO2, mode: INPUT_PULLUP, inverted: true }
    on_click:
      min_length: 50ms
      max_length: 1500ms
      then:
        - if:
            condition:
              lambda: "return id(g_booted);"
            then:
              - logger.log: "KEY1 tap — entering sleep"
              - script.execute: go_to_sleep

  # KEY2 = refresh (re-fetch + redraw the current artwork).
  - platform: gpio
    name: "KEY2 refresh"
    internal: true
    pin: { number: GPIO3, mode: INPUT_PULLUP, inverted: true }
    on_press:
      - logger.log: "KEY2 refresh"
      - component.update: online_artwork

  # KEY3 = wake (a press wakes from sleep via ext1). Factory reset is the
  # KEY1+KEY3 combo below, so KEY3 alone has no awake action.
  - platform: gpio
    name: "KEY3 wake"
    id: key3_btn
    internal: true
    pin: { number: GPIO5, mode: INPUT_PULLUP, inverted: true }

  # Factory reset = hold KEY1 + KEY3 together for 15s (accident-resistant vs a
  # single long-hold). This template is ON only while BOTH are pressed; the
  # delayed_on filter requires that to hold continuously for 15s before it fires.
  - platform: template
    id: combo_reset
    internal: true
    lambda: "return id(key1_btn).state && id(key3_btn).state;"
    filters:
      - delayed_on: 15s
    on_press:
      - logger.log: "KEY1+KEY3 held 15s — factory reset"
      - button.press: factory_reset_button

sensor:
  - platform: adc
    pin: GPIO1
    id: batt
    name: "Battery Voltage"
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 1.1
  # ESPHome manages Wi-Fi itself, so the raw Arduino WiFi.RSSI() returns 0.
  # This sensor reads the real signal strength the app reports.
  - platform: wifi_signal
    id: wifi_rssi_sensor
    update_interval: 60s
    internal: true

# Fraunces — the same display serif as the Ink app, for a consistent look.
font:
  - file: { type: gfonts, family: Fraunces, weight: 800 }
    id: ink_display
    size: 78
  - file: { type: gfonts, family: Fraunces, weight: 600 }
    id: ink_head
    size: 33
  - file: { type: gfonts, family: Fraunces, weight: 400 }
    id: ink_body
    size: 25
  - file: { type: gfonts, family: Fraunces, weight: 400, italic: true }
    id: ink_italic
    size: 23

qr_code:
  - id: wifi_qr
    value: "WIFI:S:${friendly_name};T:nopass;;"
  - id: app_qr
    value: "${app_url}"

# Poll a tiny version stamp; only re-fetch + redraw when the artwork changed.
# This makes a Regenerate (or the daily job) appear on the frame within ~60s
# without flashing the e-ink on every poll.
interval:
  # Re-resolve the server URL periodically so a moved backend is picked up
  # without a reflash (and within minutes, not the 15-min reboot timeout).
  - interval: 300s
    then:
      - script.execute: resolve_server
  - interval: 60s
    then:
      - http_request.get:
          # Piggyback telemetry on the poll so the app can show battery / Wi-Fi /
          # firmware (the backend reads these query params on the .ver check-in).
          url: !lambda |-
            float rssi = id(wifi_rssi_sensor).state;
            int rssi_i = isnan(rssi) ? 0 : (int) rssi;
            float bv = id(batt).state;
            if (isnan(bv)) bv = 0.0f;
            char q[72];
            snprintf(q, sizeof(q), ".ver?bat=%.2f&rssi=%d&fw=${fw_label}", bv, rssi_i);
            return id(g_backend) + "/media/current/" + get_mac_address() + q;
          collect_headers: ["x-ver", "x-power", "x-sleep", "x-wake", "x-wake-secs", "x-orient", "x-ota-md5", "x-cmd"]
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) return;
                  // Power/sleep config (every poll).
                  std::string p = response->get_response_header("x-power");
                  if (!p.empty()) id(g_power) = p;
                  std::string sm = response->get_response_header("x-sleep");
                  if (!sm.empty()) id(g_sleep_min) = atoi(sm.c_str());
                  // Prefer minute-precise seconds; fall back to the legacy hour.
                  std::string ws = response->get_response_header("x-wake-secs");
                  if (!ws.empty()) { id(g_wake_secs) = atoi(ws.c_str()); }
                  else { std::string wh = response->get_response_header("x-wake");
                         if (!wh.empty()) id(g_wake_secs) = atoi(wh.c_str()) * 3600; }
                  std::string ori = response->get_response_header("x-orient");
                  if (!ori.empty()) id(g_portrait) = (ori == "portrait");
                  std::string m5 = response->get_response_header("x-ota-md5");
                  if (!m5.empty()) id(g_ota_md5) = m5;
                  // Decide whether to redraw — from a version change and/or an
                  // app 'refresh' command — but redraw at most ONCE per poll so a
                  // freshly generated image (new version + queued refresh) doesn't
                  // flash the e-ink twice.
                  bool do_refresh = false;
                  std::string v = response->get_response_header("x-ver");
                  if (!v.empty()) {
                    if (id(last_ver).empty()) { id(last_ver) = v; }
                    else if (v != id(last_ver)) { id(last_ver) = v; do_refresh = true; }
                  }
                  std::string cmd = response->get_response_header("x-cmd");
                  if (cmd == "sleep") {
                    ESP_LOGI("ink", "app command: sleep");
                    id(go_to_sleep)->execute();
                    return;                       // don't also redraw when sleeping
                  }
                  // OTA / reset run AFTER this HTTP call returns (sibling actions
                  // below) so we never start a second request inside this callback.
                  if (cmd == "ota")   { ESP_LOGI("ink", "app command: OTA");   id(g_do_ota)   = true; }
                  if (cmd == "reset") { ESP_LOGI("ink", "app command: reset"); id(g_do_reset) = true; }
                  if (cmd == "refresh") do_refresh = true;
                  if (do_refresh) {
                    ESP_LOGI("ink", "refreshing artwork");
                    id(online_artwork)->update();
                  }
                  ESP_LOGI("ink", "poll: power=%s sleep_min=%d uptime=%us cmd=%s",
                           id(g_power).c_str(), id(g_sleep_min),
                           (unsigned)(millis() / 1000UL), cmd.c_str());
      # Factory reset (full wipe + re-onboard) requested from the app.
      - if:
          condition:
            lambda: "return id(g_do_reset);"
          then:
            - lambda: "id(g_do_reset) = false;"
            - button.press: factory_reset_button
      # OTA: pull + flash the latest firmware from the backend (reboots on success).
      - if:
          condition:
            lambda: "return id(g_do_ota);"
          then:
            - lambda: "id(g_do_ota) = false;"
            - script.execute: do_ota
      # On battery: after the awake window, sleep until the next update hour.
      # Sleep rules: plugged in (usb) -> always awake; on battery -> sleep after
      # g_sleep_min minutes of uptime (applies whether paired or still pairing).
      - if:
          condition:
            lambda: 'return id(g_power) == "battery" &&
                            millis() > (uint32_t) id(g_sleep_min) * 60000UL;'
          then:
            - script.execute: go_to_sleep

online_image:
  url: "${backend_base}/media/current/placeholder.png"
  id: online_artwork
  format: png
  resize: 800x480
  type: BINARY
  update_interval: never
  on_download_finished:
    then:
      # Only redraw on a successful decode. A failed re-fetch leaves get_width()==0,
      # so redrawing would blank a working frame back to the pairing screen — keep
      # showing the last good artwork instead.
      - lambda: |-
          int w = id(online_artwork).get_width();
          ESP_LOGI("ink", "download finished: decoded %dx%d", w, id(online_artwork).get_height());
          if (w > 0) {
            id(image_loaded) = true;
            if (!id(g_paired_once)) id(g_paired_once) = true;  // set-up frame now
            id(my_display)->update();
          } else {
            ESP_LOGW("ink", "image fetch failed — keeping the previous frame");
          }

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: waveshare_epaper
    id: my_display
    cs_pin: GPIO44
    dc_pin: GPIO10
    reset_pin: GPIO38
    busy_pin: { number: GPIO4, inverted: true }
    # Slow SPI clock: tolerant of a ribbon-extended bus (works direct at any speed).
    data_rate: 200kHz
    model: 7.50inv2
    update_interval: never
    lambda: |-
      if (id(image_loaded) && id(online_artwork).get_width() > 0) {
        it.image(0, 0, id(online_artwork), Color::BLACK, Color::WHITE);
      } else {
        // Pre-WiFi: the portrait Ink onboarding screen (app QR + Wi-Fi steps).
        it.fill(Color::WHITE);
        it.image(0, 0, id(onboarding_img), Color::BLACK, Color::WHITE);
      }
      // Asleep indicator: a small crescent moon in the corner. It is drawn into
      // the last frame before deep sleep, so the retained e-ink shows it the
      // whole time the frame is asleep.
      if (id(g_asleep)) {
        // White moon disc with a black crescent inside ("white on black"), small
        // and tucked in the artwork's BOTTOM-LEFT corner (as the viewer sees it).
        // The white plate keeps it visible over dark artwork; a thin black outline
        // keeps it visible over white margins too. It tracks orientation: with no
        // display rotation, panel coords map straight to the view, so landscape's
        // bottom-left is panel (M, 480-M). Portrait art is rotated 90deg CCW into
        // the panel (mounted 90deg CW to view), so the viewer's bottom-left maps to
        // panel (800-M, 480-M) and the crescent rotates with it.
        const bool portrait = id(g_portrait);
        const int R = 7, d = 4, M = 20, PLATE = R + 3;  // crescent r, offset, margin, plate r
        const int cx = portrait ? (800 - M) : M;
        const int cy = 480 - M;
        const int ox = portrait ? 0 : d;           // cut-disc offset (panel space)
        const int oy = portrait ? -d : 0;
        it.filled_circle(cx, cy, PLATE, Color::WHITE);  // white disc (visible on dark art)
        it.circle(cx, cy, PLATE, Color::BLACK);         // outline (visible on white margins)
        for (int yy = -R; yy <= R; yy++) {
          for (int xx = -R; xx <= R; xx++) {
            bool in_main = (xx * xx + yy * yy) <= R * R;
            int rx = xx - ox, ry = yy - oy;
            bool in_cut = (rx * rx + ry * ry) <= R * R;
            if (in_main && !in_cut) it.draw_pixel_at(cx + xx, cy + yy, Color::BLACK);
          }
        }
      }

image:
  - file: onboarding.png
    id: onboarding_img
    type: BINARY
    resize: 800x480

script:
  - id: boot_sequence
    then:
      # E-paper is persistent: after a reset it still physically shows the last
      # artwork. Force a redraw to the onboarding / QR welcome screen first (the
      # 1s delay lets the panel finish init so the draw isn't a no-op), so a reset
      # never leaves the stale image up. Fresh art replaces it once downloaded.
      - delay: 1s
      # Only draw the QR welcome on a frame that has never shown art (fresh or
      # just factory-reset). A set-up frame keeps its retained artwork on screen
      # through the reboot/wake — no pairing-screen flash.
      - if:
          condition:
            lambda: 'return !id(g_paired_once);'
          then:
            - lambda: 'id(image_loaded) = false;'
            - component.update: my_display
      - wait_until: wifi.connected    # stays awake through captive-portal onboarding
      - lambda: "id(g_booted) = true;"  # OTA/WiFi reachable — manual sleep now allowed
      - script.execute: resolve_server  # learn the current backend URL (server.txt)
      - delay: 3s                        # give the resolve a moment to land
      - wait_until:
          condition:
            lambda: "return id(sntp_time).now().is_valid();"
          timeout: 30s
      - lambda: |-
          std::string url = id(g_backend) + "/media/current/" +
                            get_mac_address() + ".png";
          id(online_artwork).set_url(url.c_str());
      - component.update: online_artwork

  # Fetch the current backend URL from the permanent pointer (server.txt). The
  # body is the URL; on failure we keep whatever g_backend already holds.
  - id: resolve_server
    then:
      - http_request.get:
          url: "${config_url}"
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (response->status_code != 200) return;
                  std::string u = body;
                  // trim surrounding whitespace / newlines
                  size_t a = u.find_first_not_of(" \t\r\n");
                  size_t b = u.find_last_not_of(" \t\r\n");
                  if (a == std::string::npos) return;
                  u = u.substr(a, b - a + 1);
                  while (!u.empty() && u.back() == '/') u.pop_back();
                  if (u.rfind("http", 0) == 0 && u != id(g_backend)) {
                    id(g_backend) = u;
                    ESP_LOGI("ink", "backend resolved: %s", u.c_str());
                  }

  # Pull + flash the latest firmware from the backend. ESPHome verifies the
  # downloaded image against md5_url before swapping the partition, then reboots.
  # On failure the ota on_error handler logs and the current firmware stays put.
  - id: do_ota
    then:
      # Safety backstop (the app gates too): never flash on low battery off USB —
      # a power loss mid-write wastes the cycle. ~3.75V ≈ 50%. The dual-partition +
      # MD5 scheme means an interrupted flash can't brick it, but we still refuse.
      - if:
          condition:
            lambda: 'return id(g_power) != "usb" && id(batt).state > 0.0f && id(batt).state < 3.75f;'
          then:
            - lambda: 'ESP_LOGW("ink", "OTA refused: low battery (%.2fV), not on USB", id(batt).state);'
          else:
            - if:
                condition:
                  lambda: 'return id(g_ota_md5).length() != 32;'
                then:
                  - lambda: 'ESP_LOGW("ink", "OTA refused: no/invalid md5 from server (len=%u)", (unsigned) id(g_ota_md5).length());'
                else:
                  # md5 comes from the .ver header (reliable), not a separate fetch.
                  - lambda: 'ESP_LOGI("ink", "OTA: pulling %s (md5 %s)", (id(g_backend) + "/firmware/ink-frame.bin").c_str(), id(g_ota_md5).c_str());'
                  - ota.http_request.flash:
                      md5: !lambda 'return id(g_ota_md5);'
                      url: !lambda 'return id(g_backend) + "/firmware/ink-frame.bin";'

  # Sleep until the next daily update hour (timer = guaranteed wake); KEY1 or KEY3
  # also wake it any time. Used by the battery idle timer and by a KEY1 tap.
  - id: go_to_sleep
    then:
      - lambda: 'ESP_LOGI("ink", "go_to_sleep: START (backend=%s)", id(g_backend).c_str());'
      # Wait for the keys to be released first — otherwise a still-pressed wake
      # pin would immediately re-wake the chip (the old boot loop).
      - wait_until:
          condition:
            and:
              - binary_sensor.is_off: key1_btn
              - binary_sensor.is_off: key3_btn
          timeout: 8s
      # Tell the backend we're going to sleep so the app shows "Asleep" right
      # away instead of waiting ~5 min for the missed check-in.
      - http_request.get:
          url: !lambda 'return id(g_backend) + "/media/sleep/" + get_mac_address();'
          on_response:
            then:
              - lambda: 'ESP_LOGI("ink", "sleep ping -> HTTP %d", response->status_code);'
          on_error:
            then:
              - lambda: 'ESP_LOGW("ink", "sleep ping FAILED (network)");'
      - lambda: 'ESP_LOGI("ink", "go_to_sleep: drawing moon");'
      - lambda: 'id(g_asleep) = true;'
      - component.update: my_display   # stamp the moon onto the retained frame
      - lambda: |-
          auto t = id(sntp_time).now();
          uint32_t delta = 3600;  // 1h fallback if the clock isn't set
          if (t.is_valid()) {
            int now_s = t.hour * 3600 + t.minute * 60 + t.second;
            int wake_s = id(g_wake_secs);
            int d = wake_s - now_s;
            if (d <= 0) d += 86400;
            delta = (uint32_t) d;
          }
          id(deep_sleep_component)->set_sleep_duration(delta * 1000ULL);
          ink_enable_button_wakeup();   // wake on KEY1 or KEY3 (ext1)
      - delay: 1s
      - lambda: 'id(deep_sleep_component)->begin_sleep();'
