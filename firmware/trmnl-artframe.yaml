# ---------------------------------------------------------------------------
# Ink — product firmware (ESPHome, multi-tenant backend).
#
# Every frame runs the SAME firmware and points at the SAME backend; the device
# identifies itself by its WiFi MAC, so there is nothing per-device to flash.
#
# Behavior:
#   • No WiFi saved  -> shows "Join WiFi: Ink Frame" + hosts an onboarding hotspot.
#   • WiFi, unpaired -> shows a QR + 6-digit code; scan/enter it in the Ink app.
#   • Paired:
#       - On USB power -> stays ON, refreshes the art periodically.
#       - On battery   -> sleeps; press KEY1 to wake + refresh, then sleeps again
#                         after `idle_minutes` of no interaction.
#   Buttons: KEY1 = wake/refresh, KEY2 = stay awake, KEY3 = tap: sleep · hold 5s:
#   factory reset (clears WiFi + pairing).
#
# Set `backend_base` before flashing. `timezone` is for the clock; the daily
# generation hour is set per frame in the app.
# ---------------------------------------------------------------------------
substitutions:
  device_name: ink-frame
  friendly_name: "Ink Frame"
  backend_base: "http://10.0.0.26:8000"
  timezone: "Asia/Jerusalem"
  idle_minutes: "10"               # battery: sleep after this much idle time
  powered_voltage: "4.15"          # >= this reads as "on USB power" (calibrate)
  powered_refresh_minutes: "60"    # powered: how often to re-fetch the art

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600
    then:
      - globals.set: { id: is_sleeping_icon, value: "false" }
      - script.execute: boot_sequence

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: arduino

wifi:
  power_save_mode: light
  ap:
    ssid: ${friendly_name}   # onboarding hotspot when no WiFi is saved
  on_connect:
    - logger.log: "WiFi connected"

captive_portal:

ota:
  - platform: esphome

logger:
  level: INFO
  baud_rate: 115200

http_request:
  useragent: esphome/ink
  timeout: 30s
  verify_ssl: false

time:
  - platform: sntp
    id: sntp_time
    timezone: ${timezone}

globals:
  - id: is_sleeping_icon
    type: bool
    initial_value: "false"
  - id: image_loaded
    type: bool
    initial_value: "false"
  - id: is_powered
    type: bool
    initial_value: "false"

deep_sleep:
  id: deep_sleep_component
  wakeup_pin:
    number: GPIO2            # KEY1 wakes the frame from deep sleep
    inverted: true
    mode: INPUT_PULLUP
    allow_other_uses: true

button:
  - platform: factory_reset
    id: factory_reset_button
    name: "Factory Reset"
    internal: true

binary_sensor:
  - platform: gpio
    name: "KEY1 wake/refresh"
    internal: true
    pin: { number: GPIO2, mode: INPUT_PULLUP, inverted: true, allow_other_uses: true }
    on_press:
      - globals.set: { id: is_sleeping_icon, value: "false" }
      - script.execute: idle_timer        # reset the idle countdown
      - component.update: online_artwork   # pull the latest art

  - platform: gpio
    name: "KEY2 stay awake"
    internal: true
    pin: { number: GPIO3, mode: INPUT_PULLUP, inverted: true }
    on_press:
      - script.stop: idle_timer

  - platform: gpio
    name: "KEY3"
    internal: true
    pin: { number: GPIO5, mode: INPUT_PULLUP, inverted: true }
    on_multi_click:
      - timing:                            # quick tap -> sleep now
          - ON for at most 1s
        then:
          - script.execute: go_to_sleep
      - timing:                            # hold 5s -> factory reset
          - ON for at least 5s
        then:
          - logger.log: "Factory reset (held 5s)"
          - button.press: factory_reset_button

sensor:
  - platform: adc
    pin: GPIO1
    id: batt
    name: "Battery Voltage"
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 1.1

font:
  - file: "gfonts://Roboto"
    id: roboto
    size: 34
  - file: "gfonts://Roboto"
    id: roboto_small
    size: 22

# QR that encodes "join my open Wi-Fi hotspot" — phone cameras join on scan.
qr_code:
  - id: wifi_qr
    value: "WIFI:S:${friendly_name};T:nopass;;"

# Powered mode: re-fetch the art periodically (guarded so battery mode ignores it).
interval:
  - interval: ${powered_refresh_minutes}min
    then:
      - if:
          condition:
            lambda: "return id(is_powered);"
          then:
            - component.update: online_artwork

online_image:
  url: "${backend_base}/media/current/placeholder.png"
  id: online_artwork
  format: png
  resize: 800x480
  type: BINARY
  update_interval: never
  on_download_finished:
    then:
      - lambda: "if (id(online_artwork).get_width() > 0) { id(image_loaded) = true; }"
      - component.update: my_display

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

display:
  - platform: waveshare_epaper
    id: my_display
    cs_pin: GPIO44
    dc_pin: GPIO10
    reset_pin: GPIO38
    busy_pin: { number: GPIO4, inverted: true }
    model: 7.50inv2
    update_interval: never
    lambda: |-
      if (id(image_loaded) && id(online_artwork).get_width() > 0) {
        it.image(0, 0, id(online_artwork), Color::BLACK, Color::WHITE);
      } else {
        // Pairing mode: instructions on the left, a "join my Wi-Fi" QR on the right.
        it.fill(Color::WHITE);
        it.print(60, 90, id(roboto), Color::BLACK, TextAlign::TOP_LEFT, "Pairing mode");
        it.print(60, 150, id(roboto_small), Color::BLACK, TextAlign::TOP_LEFT,
                 "1. Scan this QR, or join");
        it.print(60, 182, id(roboto_small), Color::BLACK, TextAlign::TOP_LEFT,
                 "   Wi-Fi: ${friendly_name}");
        it.print(60, 230, id(roboto_small), Color::BLACK, TextAlign::TOP_LEFT,
                 "2. Pick your home Wi-Fi");
        it.print(60, 262, id(roboto_small), Color::BLACK, TextAlign::TOP_LEFT,
                 "   on the page that opens.");
        it.qr_code(540, 150, id(wifi_qr), Color::BLACK, 5);
      }
      it.filled_rectangle(0, 0, 16, 16, Color::BLACK);
      if (id(is_sleeping_icon)) {
        it.filled_circle(8, 8, 6, Color::WHITE);
        it.filled_circle(11, 5, 6, Color::BLACK);
      } else {
        it.line(3, 8, 7, 13, Color::WHITE);
        it.line(7, 13, 14, 3, Color::WHITE);
      }

script:
  - id: boot_sequence
    then:
      - wait_until: wifi.connected    # stays awake through captive-portal onboarding
      - delay: 3s
      - wait_until:
          condition:
            lambda: "return id(sntp_time).now().is_valid();"
          timeout: 30s
      - lambda: |-
          std::string url = "${backend_base}/media/current/" +
                            get_mac_address() + ".png";
          id(online_artwork).set_url(url.c_str());
      - component.update: online_artwork
      - delay: 2s
      # Decide power mode from the battery rail voltage.
      - component.update: batt
      - delay: 400ms
      - lambda: "id(is_powered) = (id(batt).state >= ${powered_voltage});"
      - if:
          condition:
            lambda: "return id(is_powered);"
          then:
            - logger.log: "On USB power - staying awake"
          else:
            - logger.log: "On battery - will sleep when idle"
            - script.execute: idle_timer

  # Battery idle timer: any KEY1 press restarts it; KEY2 stops it.
  - id: idle_timer
    mode: restart
    then:
      - delay: ${idle_minutes}min
      - script.execute: go_to_sleep

  - id: go_to_sleep
    then:
      - logger.log: "Sleeping (wake with KEY1)"
      - globals.set: { id: is_sleeping_icon, value: "true" }
      - component.update: my_display
      - delay: 3s
      # No sleep duration -> wakes only on the KEY1 pin.
      - lambda: "id(deep_sleep_component).begin_sleep();"
